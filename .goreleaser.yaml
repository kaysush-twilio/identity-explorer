version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: identity-explorer
    main: ./cmd/identity-explorer
    binary: identity-explorer
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: kaysush-twilio
    name: identity-explorer
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} v{{.Version}}"

brews:
  - name: identity-explorer
    repository:
      owner: kaysush-twilio
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/kaysush-twilio/identity-explorer"
    description: "TUI tool for exploring Identity Service data in DynamoDB"
    license: "MIT"
    skip_upload: auto
    test: |
      system "#{bin}/identity-explorer --version"
    install: |
      bin.install "identity-explorer"
